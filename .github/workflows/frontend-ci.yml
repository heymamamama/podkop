name: Frontend CI

on:
  push:
    branches:
      - main
      - 'rc/**'
    paths:
      - 'fe-app-podkop/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'fe-app-podkop/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  frontend-checks:
    name: Frontend Quality Checks
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: fe-app-podkop

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v5.0.0
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: fe-app-podkop/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        id: format
        run: |
          yarn format
          if ! git diff --exit-code; then
            echo "::error::Code is not formatted. Run 'yarn format' locally."
            exit 1
          fi

      - name: Run linter
        run: yarn lint --max-warnings=0

      - name: Run tests
        run: yarn test --run

      - name: Build project
        id: build
        run: |
          yarn build
          if ! git diff --exit-code; then
            echo "::error::Build generated changes. Check build output."
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Frontend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Format: ${{ steps.format.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
