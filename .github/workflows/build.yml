name: Build and Release

on:
  push:
    branches:
      - main
      - 'rc/**'
    tags:
      - "v*"
    paths:
      - '.github/workflows/build.yml'
      - 'Dockerfile-*'
      - 'podkop/**'
      - 'luci-app-podkop/**'
      - 'fe-app-podkop/**'
  pull_request:
    branches:
      - main
      - 'rc/**'
    paths:
      - '.github/workflows/build.yml'
      - 'Dockerfile-*'
      - 'podkop/**'
      - 'luci-app-podkop/**'
      - 'fe-app-podkop/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: v0.8.0 or 0.8.0)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      package_version: ${{ steps.meta.outputs.package_version }}
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      is_release: ${{ steps.meta.outputs.is_release }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Resolve version
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ] && [ "$REF_TYPE" = "tag" ]; then
            VERSION="$REF_NAME"
          fi

          if [ -z "$VERSION" ]; then
            VERSION="0.$(date +%d%m%Y)"
          fi

          IS_RELEASE=false
          if [ "$REF_TYPE" = "tag" ] || [ -n "$INPUT_VERSION" ]; then
            IS_RELEASE=true
          fi

          RELEASE_TAG=""
          if [ "$IS_RELEASE" = "true" ]; then
            if [[ "$VERSION" != v* ]]; then
              RELEASE_TAG="v$VERSION"
            else
              RELEASE_TAG="$VERSION"
            fi
          fi

          PACKAGE_VERSION="${VERSION#v}"
          ARTIFACT_VERSION="${RELEASE_TAG:-$PACKAGE_VERSION}"

          IS_PRERELEASE=false
          case "${RELEASE_TAG:-$VERSION}" in
            *-alpha*|*-beta*|*-rc*) IS_PRERELEASE=true ;;
          esac

          {
            echo "version=${RELEASE_TAG:-$PACKAGE_VERSION}"
            echo "package_version=$PACKAGE_VERSION"
            echo "artifact_version=$ARTIFACT_VERSION"
            echo "release_tag=$RELEASE_TAG"
            echo "is_release=$IS_RELEASE"
            echo "is_prerelease=$IS_PRERELEASE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Release Metadata"
            echo "- Version: \`${RELEASE_TAG:-$PACKAGE_VERSION}\`"
            echo "- Package version: \`$PACKAGE_VERSION\`"
            echo "- Artifact version: \`$ARTIFACT_VERSION\`"
            echo "- Release tag: \`${RELEASE_TAG:-n/a}\`"
            echo "- Create release: \`$IS_RELEASE\`"
            echo "- Prerelease: \`$IS_PRERELEASE\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: fe-app-podkop
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: fe-app-podkop/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: |
          yarn format
          git diff --exit-code

      - name: Run linter
        run: yarn lint --max-warnings=0

      - name: Run tests
        run: yarn test --run

      - name: Build frontend
        run: |
          yarn build
          git diff --exit-code

  build:
    name: Build ${{ matrix.package_type }} Packages
    runs-on: ubuntu-24.04
    needs: [prepare, frontend]
    strategy:
      matrix:
        package_type: [ipk, apk]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.package_type }}
        uses: docker/build-push-action@v6.18.0
        with:
          file: ./Dockerfile-${{ matrix.package_type }}
          context: .
          tags: podkop:ci-${{ matrix.package_type }}
          load: true
          cache-from: type=gha,scope=${{ matrix.package_type }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package_type }}
          build-args: |
            PODKOP_VERSION=${{ needs.prepare.outputs.package_version }}

      - name: Create build container
        run: docker create --name ${{ matrix.package_type }} podkop:ci-${{ matrix.package_type }}

      - name: Copy packages from container
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "./bin/${{ matrix.package_type }}"
          docker cp ${{ matrix.package_type }}:/builder/bin/packages/x86_64/utilities/. "./bin/${{ matrix.package_type }}/"
          docker cp ${{ matrix.package_type }}:/builder/bin/packages/x86_64/luci/. "./bin/${{ matrix.package_type }}/"

      - name: Normalize release assets
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.artifact_version }}
          PACKAGE_TYPE: ${{ matrix.package_type }}
        run: |
          set -euo pipefail

          mkdir -p "./filtered-bin/${PACKAGE_TYPE}"

          copy_asset() {
            local pattern="$1"
            local target="$2"
            local source

            source="$(find "./bin/${PACKAGE_TYPE}" -maxdepth 1 -type f -name "$pattern" | sort | head -n1)"
            if [ -z "$source" ]; then
              echo "::error::Cannot find asset matching pattern: $pattern"
              exit 1
            fi

            cp "$source" "./filtered-bin/${PACKAGE_TYPE}/${target}"
          }

          copy_asset "podkop*.${PACKAGE_TYPE}" "podkop-${VERSION}.${PACKAGE_TYPE}"
          copy_asset "luci-app-podkop*.${PACKAGE_TYPE}" "luci-app-podkop-${VERSION}.${PACKAGE_TYPE}"
          copy_asset "luci-i18n-podkop-ru*.${PACKAGE_TYPE}" "luci-i18n-podkop-ru-${VERSION}.${PACKAGE_TYPE}"

      - name: List release assets
        shell: bash
        run: |
          {
            echo "## Built ${{ matrix.package_type }} assets"
            echo '```'
            ls -la "./filtered-bin/${{ matrix.package_type }}/"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-files-${{ needs.prepare.outputs.artifact_version }}-${{ matrix.package_type }}
          path: ./filtered-bin/${{ matrix.package_type }}/*.${{ matrix.package_type }}
          retention-days: 7
          if-no-files-found: error

      - name: Remove build container
        if: always()
        run: docker rm -f ${{ matrix.package_type }} || true

  release:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs: [prepare, build]
    if: needs.prepare.outputs.is_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-files-${{ needs.prepare.outputs.artifact_version }}-*
          path: ./filtered-bin/release
          merge-multiple: true

      - name: Build release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          VERSION: ${{ needs.prepare.outputs.artifact_version }}
        run: |
          set -euo pipefail

          mkdir -p ./.release
          RELEASE_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > ./.release/generated-notes.md

          {
            echo "## Packages"
            while IFS= read -r asset; do
              name="$(basename "$asset")"
              echo "- [${name}](${RELEASE_BASE_URL}/${name})"
            done < <(find ./filtered-bin/release -maxdepth 1 -type f | sort)
            echo
            echo "## Install"
            echo '```bash'
            echo "wget ${RELEASE_BASE_URL}/podkop-${VERSION}.ipk"
            echo "opkg install podkop-${VERSION}.ipk"
            echo '```'
            echo
            cat ./.release/generated-notes.md
          } > ./.release/release-notes.md

          {
            echo "## Release assets"
            echo
            cat ./.release/release-notes.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update release
        uses: softprops/action-gh-release@v2.4.0
        with:
          files: ./filtered-bin/release/*
          body_path: ./.release/release-notes.md
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease != 'true' }}
          name: ${{ needs.prepare.outputs.release_tag }}
          tag_name: ${{ needs.prepare.outputs.release_tag }}
